  <main class="container py-4">
    <section class="mb-5" style="max-width: 640px;">
      <h1 class="mb-3">Contact</h1>
      <p class="lead mb-4">Feel free to reach out &mdash; I&rsquo;ll get back to you as soon as I can.</p>

      <form>
        <div class="mb-3">
          <label for="contactEmail" class="form-label">Your Email address</label>
          <input type="email" class="form-control" id="contactEmail" placeholder="name@example.com" autocomplete="email">
        </div>
        <div class="mb-3">
          <label for="contactMessage" class="form-label">Message</label>
          <textarea class="form-control" id="contactMessage" rows="5" placeholder="What's on your mind?"></textarea>
        </div>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#emailModal">
          Send message
        </button>
      </form>
    </section>

    <!-- Modal -->
    <div class="modal fade" id="emailModal" tabindex="-1" aria-labelledby="emailModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="emailModalLabel">Thanks for your message!</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            Your message has been received. I&rsquo;ll be in touch soon.
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

  </main>
